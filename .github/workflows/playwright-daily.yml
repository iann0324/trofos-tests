name: Playwright Daily Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    # Runs every day at 00:00 UTC (08:00 SGT)
    - cron: '0 0 * * *'
  # Allows manual trigger from the "Actions" tab in GitHub
  workflow_dispatch:

jobs:
  test-main:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Main Playwright Suite (without logout)
        run: npm run test:all
        env:
          CI: 'true'
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload Main HTML Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-main
          path: playwright-report/
          retention-days: 30

  test-logout:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: test-main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Logout Test
        run: npm run test:logout
        env:
          CI: 'true'
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload Logout HTML Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-logout
          path: playwright-report/
          retention-days: 30
